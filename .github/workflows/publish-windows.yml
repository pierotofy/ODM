    #   run: cmd /c user-create.bat
    # - name: VM Info.
    #   run: cmd /c info.bat
    # - name: Keep your VM alive.
    #   run: cmd /c loop.bat
    - name: Build sources
      run: |
        python configure.py build
    - name: Create setup
      env: 
        CODE_SIGN_CERT_PATH: ${{ steps.code_sign.outputs.filePath }}
      run: |
        python configure.py dist --signtool-path $((Get-Command signtool).Source) --code-sign-cert-path $env:CODE_SIGN_CERT_PATH
    - name: Upload Setup File
      uses: actions/upload-artifact@v2
      with:
        name: Setup
        path: dist\*.exe
    - name: Upload Setup to Release
      uses: svenstaro/upload-release-action@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: dist\*.exe
        file_glob: true
        tag: ${{ github.ref }}
        overwrite: true

